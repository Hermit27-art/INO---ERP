<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INO ERP</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-800">

<div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 hidden">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-8">
    <h1 class="text-xl font-extrabold text-center mb-1">INO ERP</h1>
    <p class="text-xs text-slate-400 text-center mb-6">Masuk untuk melanjutkan</p>
    <div id="login-error" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded p-2 mb-3"></div>
    <label class="text-[11px] font-bold uppercase text-slate-500">Username</label>
    <input id="login-username" class="w-full border rounded px-3 py-2 mb-3 text-sm" placeholder="Administrator">
    <label class="text-[11px] font-bold uppercase text-slate-500">Password</label>
    <input id="login-password" type="password" class="w-full border rounded px-3 py-2 mb-5 text-sm">
    <button onclick="doLogin()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 rounded text-sm">Masuk</button>
  </div>
</div>

<div id="setup-banner" class="hidden bg-amber-100 text-amber-900 text-xs px-4 py-2 border-b border-amber-300">
  ⚠️ Belum terhubung ke Google Sheets. Isi <b>API_URL</b> di <code>app.js</code> dengan URL Web App Apps Script Anda, lalu muat ulang halaman.
</div>

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-56 bg-slate-900 text-slate-300 flex flex-col shrink-0">
    <div class="px-4 py-4 border-b border-slate-800">
      <h1 class="text-white font-extrabold text-lg leading-none" id="side-toko-name">INO ERP</h1>
      <span class="text-[10px] text-slate-500">Sinkron dengan Google Sheets</span>
    </div>
    <nav id="nav-menu" class="flex-1 overflow-y-auto py-2 text-sm"></nav>
    <div class="p-3 border-t border-slate-800 text-[11px]">
      <div id="sync-status" class="text-slate-500 mb-2">●  memuat...</div>
      <button onclick="logout()" class="w-full text-left text-slate-400 hover:text-white">⎋ Keluar</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto">
    <div id="toast-holder" class="fixed top-4 right-4 z-50 space-y-2"></div>
    <div id="main" class="p-6"></div>
  </main>
</div>

<div id="modal-root"></div>

<script src="app.js"></script>
</body>
</html>
